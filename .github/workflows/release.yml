name: Release

on:
  push:
    branches: ["master"]

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    if: github.repository == 'Seb-sti1/rmdocs'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to access full commit history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
      - name: Build changelog from semantic commits
        id: changelog
        run: |
          # Get the previous tag; fall back to the first commit if none exists
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          declare -A SECTIONS
          SECTIONS[feat]="🚀 Features"
          SECTIONS[fix]="🐛 Bug Fixes"
          SECTIONS[perf]="⚡ Performance"
          SECTIONS[refactor]="♻️ Refactoring"
          SECTIONS[docs]="📝 Documentation"
          SECTIONS[chore]="🔧 Chores"
          SECTIONS[test]="✅ Tests"
          SECTIONS[ci]="👷 CI"

          BODY=""
          for TYPE in feat fix perf refactor docs chore test ci; do
            LABEL="${SECTIONS[$TYPE]}"
            # Collect matching commits: "type: message" or "type(scope): message"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" \
              | grep -E "^${TYPE}(\(.+\))?!?:" \
              | sed -E "s/^${TYPE}(\((.+)\))?!?: //" \
              | sed 's/^/- /')
            if [ -n "$COMMITS" ]; then
              BODY="${BODY}### ${LABEL}\n${COMMITS}\n\n"
            fi
          done

          if [ -z "$BODY" ]; then
            BODY="No structured commits since last release."
          fi

          # Write to a file to safely handle multi-line content
          printf "%b" "$BODY" > changelog.md
      - name: Build
        run: python -m build
      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: changelog.md
          files: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1