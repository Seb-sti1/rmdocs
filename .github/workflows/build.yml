name: Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    name: Build rmdocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: rmdocs
          path: dist/
          if-no-files-found: error
          retention-days: 3
  
  test-pipx:
    name: Test wheel with pipx
    needs: [ build ]
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Show Python version
        run: python3 --version
      - name: Install pipx
        run: |
          sudo apt update && sudo apt install pipx
          pipx ensurepath
      - uses: actions/download-artifact@v4
        with:
          name: rmdocs
          path: dist/
      - name: Test rmdocs
        run: |
          pipx install ./dist/rmdocs-*-py3-none-any.whl
          rmdocs -h
  
  pytest:
    name: Run pytest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest

